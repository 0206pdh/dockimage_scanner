name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: new_tag
        run: |
          OLD="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${OLD#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          NEW="${{ steps.new_tag.outputs.tag }}"
          VERSION="${NEW#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW="${{ steps.new_tag.outputs.tag }}"
          git tag "$NEW"
          git push origin "$NEW"
          gh release create "$NEW" \
            --title "$NEW" \
            --notes "Install or update:
\`\`\`bash
curl -fsSL https://raw.githubusercontent.com/0206pdh/dockimage_scanner/main/install.sh | bash
\`\`\`"
