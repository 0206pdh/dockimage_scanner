name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "dockfile_scanner/pyproject.toml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          TAG=$(git tag --sort=-v:refname | head -n1)
          [ -z "$TAG" ] && TAG="v0.0.0"

          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_TAG="v${NEW_VERSION}"

          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" dockfile_scanner/pyproject.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dockfile_scanner/pyproject.toml
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.bump.outputs.tag }}"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "설치: curl -fsSL https://raw.githubusercontent.com/0206pdh/dockimage_scanner/main/dockfile_scanner/install.sh | bash"
